name: TestNG CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Exercise 2 Suite

        run: mvn test -DsuiteXmlFile=src/test/resources/exercise2.xml

      - name: Run Exercise 3 Suite

        run: mvn test -DsuiteXmlFile=src/test/resources/exercise3.xml

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-reports
          path: target/